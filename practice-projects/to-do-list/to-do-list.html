<!DOCTYPE html>
<html>
  <head>
    <title>To do list</title>
    <link rel="stylesheet" href="to-do-list.css">
  </head>

  <body>
    <p>To do list</p>

    <div class="todo-input-grid">
      <input class="js-input todo-input" type="text" placeholder="To do name">

    </div>

    <div class="js-to-do-list input-grid"></div>
  
    <script src="to-do-list.js"></script>
  </body>
</html>
