<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
    <style>

    </style>
  </head>

  <body>
    <p>Rock Paper Scissor</p>
    <button onclick="
      playGame('rock');
    ">Rock</button>

    <button onclick="
      playGame('paper')
    ">Paper</button>

    <button onclick="
      playGame('scissor')
    " >Scissor</button>

    <button onclick="
      score.win = 0;
      score.lose = 0;
      score.tie = 0;
      localStorage.removeItem('score');
    " >Reset</button>


    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {win:0, lose:0, tie:0};

      function playGame (playerMove) {
        comPick = computerPick();
        let result = '';

        if (playerMove === 'rock') {
          if (comPick === 'rock')
            result = 'Tie';
          else if (comPick === 'scissor')
            result = 'Win';
          else if (comPick === 'paper')
            result = 'Lose';
        }

        else if (playerMove === 'paper') {
          if (comPick === 'rock')
            result = 'Win';
          else if (comPick === 'scissor')
            result = 'Lose';
          else if (comPick === 'paper')
            result = 'Tie';
        }

        else if (playerMove === 'scissor') {
          if (comPick === 'rock')
            result = 'Lose';
          else if (comPick === 'scissor')
            result = 'Tie';
          else if (comPick === 'paper')
            result = 'Win';
        }

        if (result === 'Win')
          score.win += 1;
        else if (result === 'Lose')
          score.lose += 1;
        else  
          score.tie += 1;

        localStorage.setItem('score', JSON.stringify(score));
        
        alert(`You picked ${playerMove}. Computer picker ${comPick}. ${result} \n Win: ${score.win}, Lose: ${score.lose}, Tie: ${score.tie}.`)
      }

      function computerPick () {
        let choice = '';
        const randomNum = Math.random();

        if (randomNum>=0 && randomNum<1/3) {
          choice = 'rock';

        } else if (randomNum>=1/3 && randomNum<2/3) {
          choice = 'paper';
        
        }  else if (randomNum>=2/3 && randomNum<1) {
          choice = 'scissor';
        }

        return choice;
      }

    </script>
  </body>
</html>
