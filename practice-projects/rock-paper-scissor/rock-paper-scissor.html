<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissor</title>

    <link rel="stylesheet" href="rock-paper-scissor.css">
  </head>

  <body>
    <p class="title">Rock Paper Scissor</p>

    <button class="move-button" onclick="
      playGame('rock');
    "> <img class="icon" src="thumbnail/rock-emoji.png"> </button>

    <button class="move-button" onclick="
      playGame('paper')
    "> <img class="icon" src="thumbnail/paper-emoji.png"> </button>

    <button class="move-button" onclick="
      playGame('scissors')
    " > <img class="icon" src="thumbnail/scissors-emoji.png"> </button>


    <p class="js-result result"></p>
    <p class="js-move"></p>
    <p class="js-score score"></p>

    <button class="reset-button" onclick="
      score.win = 0;
      score.lose = 0;
      score.tie = 0;
      localStorage.removeItem('score');
      updateScore();
    " >Reset Score</button>

    <script src="rock-paper-scissor.js"></script>
  </body>
</html>
